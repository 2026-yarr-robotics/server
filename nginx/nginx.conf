upstream robot {
    server robot:8001;
}

upstream handineye {
    server handineye:8002;
}

upstream handtoeye {
    server handtoeye:8003;
}

server {
    listen 80;

    # Robot REST API
    location /api/robot/ {
        proxy_pass http://robot;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Hand-in-Eye REST API
    location /api/handineye/ {
        proxy_pass http://handineye;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Hand-to-Eye REST API
    location /api/handtoeye/ {
        proxy_pass http://handtoeye;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Robot state WebSocket (10Hz)
    location /ws/robot/state {
        proxy_pass http://robot;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Task log WebSocket
    location /ws/task/log {
        proxy_pass http://robot;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Hand-in-Eye camera WebSocket
    location /ws/camera/handineye {
        proxy_pass http://handineye;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Hand-to-Eye camera WebSocket
    location /ws/camera/handtoeye {
        proxy_pass http://handtoeye;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Health check
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
