upstream robot {
    server robot:8001;
}

upstream handineye {
    server handineye:8002;
}

upstream handtoeye {
    server handtoeye:8003;
}

server {
    listen 80;

    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Robot REST API (also serves Swagger UI /api/robot/docs,
    # ReDoc /api/robot/redoc, schema /api/robot/openapi.json)
    location /api/robot/ {
        proxy_pass http://robot;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Origin $http_origin;
    }

    # Hand-in-Eye REST API (also serves Swagger UI /api/handineye/docs,
    # ReDoc /api/handineye/redoc, schema /api/handineye/openapi.json)
    location /api/handineye/ {
        proxy_pass http://handineye;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Origin $http_origin;
    }

    # Hand-to-Eye REST API (also serves Swagger UI /api/handtoeye/docs,
    # ReDoc /api/handtoeye/redoc, schema /api/handtoeye/openapi.json)
    location /api/handtoeye/ {
        proxy_pass http://handtoeye;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Origin $http_origin;
    }

    # Robot state WebSocket
    location /ws/robot/state {
        proxy_pass http://robot;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Task log WebSocket
    location /ws/task/log {
        proxy_pass http://robot;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Hand-in-Eye camera WebSocket
    location /ws/camera/handineye {
        proxy_pass http://handineye;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Hand-to-Eye camera WebSocket
    location /ws/camera/handtoeye {
        proxy_pass http://handtoeye;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Health check
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # API-only domain: root redirects to Swagger docs.
    # No frontend SPA is served here; unmatched paths get nginx's default 404.
    location = / {
        return 302 /api/robot/docs;
    }
}
