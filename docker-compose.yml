services:
  # ---- Reverse proxy + Frontend serving ----
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - robot
      - handineye
      - handtoeye
    networks:
      - cup_stack
    restart: unless-stopped

  # ---- Backend domain services ----
  robot:
    build:
      context: .
      target: robot
    environment:
      - ROSBRIDGE_HOST=rosbridge
      - ROSBRIDGE_PORT=9090
    volumes:
      - ../cup_stack/ros2:/app/ros2:ro
    networks:
      - cup_stack
    restart: unless-stopped

  handineye:
    build:
      context: .
      target: handineye
    environment:
      - ROSBRIDGE_HOST=rosbridge
      - ROSBRIDGE_PORT=9090
    networks:
      - cup_stack
    restart: unless-stopped

  handtoeye:
    build:
      context: .
      target: handtoeye
    environment:
      - ROSBRIDGE_HOST=rosbridge
      - ROSBRIDGE_PORT=9090
    networks:
      - cup_stack
    restart: unless-stopped

  # ---- ROS 2 rosbridge ----
  rosbridge:
    build:
      context: .
      target: rosbridge
    networks:
      - cup_stack
    ports:
      - "9090:9090"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ~/.cloudflared/4ffcfc13-173e-468f-8623-cab1fa0813c5.json:/etc/cloudflared/4ffcfc13-173e-468f-8623-cab1fa0813c5.json:ro
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    depends_on:
      - nginx
    networks:
      - cup_stack
    restart: unless-stopped

networks:
  cup_stack:
    driver: bridge
