services:
  # ---- Reverse proxy + Frontend serving ----
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - robot
      - handineye
      - handtoeye
    networks:
      - cup_stack
    restart: unless-stopped

  # ---- Backend domain services ----
  robot:
    build:
      context: .
      target: robot
    environment:
      - ROSBRIDGE_HOST=host.docker.internal
      - ROSBRIDGE_PORT=9090
      - BRINGUP_AGENT_URL=http://host.docker.internal:8099
      - SKILL_API_URL=http://host.docker.internal:8765
      # fallen-cup YOLO inference device: "0" = CUDA:0 (GPU). CPU inference
      # (~585% CPU) starves the 100Hz ros2_control loop -> skill jitter.
      # Applied on container (re)create, no image rebuild needed.
      - FALLEN_CUP_DEVICE=0
      # Where the robot service writes persisted state (matches the volume below).
      - CUP_STATE_DIR=/app/data
    volumes:
      - ../cup_stack/ros2:/app/ros2:ro
      # Persist runtime state (pyramid config) across container restarts.
      - robot_state:/app/data
    networks:
      - cup_stack
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  handineye:
    build:
      context: .
      target: handineye
    environment:
      - ROSBRIDGE_HOST=host.docker.internal
      - ROSBRIDGE_PORT=9090
    networks:
      - cup_stack
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  handtoeye:
    build:
      context: .
      target: handtoeye
    environment:
      - ROSBRIDGE_HOST=host.docker.internal
      - ROSBRIDGE_PORT=9090
    networks:
      - cup_stack
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cloudflared:
    image: cloudflare/cloudflared:latest
    # Dashboard-managed (Zero Trust) tunnel: token comes from server/.env
    # (CF_TUNNEL_TOKEN); ingress is configured in the Cloudflare dashboard
    # (Tunnels -> Public Hostname -> yarr-api.simplyimg.com -> http://nginx:80).
    command: tunnel --no-autoupdate --protocol http2 run
    environment:
      # Put the token in server/.env (gitignored): CF_TUNNEL_TOKEN=eyJ...
      # Empty default keeps `docker compose` usable for the rest of the
      # stack; cloudflared will log a clear error if the token is unset.
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN:-}
    depends_on:
      - nginx
    networks:
      - cup_stack
    restart: unless-stopped

networks:
  cup_stack:
    driver: bridge

volumes:
  robot_state:
